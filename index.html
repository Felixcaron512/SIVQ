<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>SIVQ - Portail</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Bienvenue sur SIVQ</h1>

  <button onclick="charger()">Charger mes données</button>
  <button onclick="sauver()">Sauver des données</button>

  <pre id="output"></pre>

  <script>
    async function charger() {
      const res = await fetch("/api/data");
      const data = await res.json();
      document.getElementById("output").innerText = JSON.stringify(data, null, 2);
    }

    async function sauver() {
      const exemple = { user: "Jean", permis: "AB123456" };
      await fetch("/api/data", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(exemple)
      });
      alert("Sauvegarde réussie !");
    }
  </script>
</body>
</html>
