<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SIVQ - Portail</title>
</head>
<body>
  <h1>Bienvenue au portail SIVQ 🚗</h1>
  <button onclick="chargerUtilisateurs()">Voir les utilisateurs</button>
  <ul id="liste"></ul>

  <script>
    async function chargerUtilisateurs() {
      const res = await fetch("/api/users");
      const data = await res.json();
      const ul = document.getElementById("liste");
      ul.innerHTML = "";
      data.forEach(u => {
        const li = document.createElement("li");
        li.textContent = `${u.name} - ${u.email}`;
        ul.appendChild(li);
      });
    }
  </script>
</body>
</html>
